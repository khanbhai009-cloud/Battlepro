name: Build 3 APKs

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    strategy:
      matrix:
        variant: 
          - { name: "admin", config: "cap.admin.json", output: "BattlePro-Admin.apk" }
          - { name: "staff", config: "cap.staff.json", output: "BattlePro-Staff.apk" }
          - { name: "user", config: "cap.user.json", output: "BattlePro-User.apk" }
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'
          cache: 'gradle'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Generate Google Services JSON
        run: |
          mkdir -p android/app
          echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > android/app/google-services.json
        continue-on-error: true

      - name: Copy ${{ matrix.variant.name }} Configuration
        run: |
          cp ${{ matrix.variant.config }} capacitor.config.json
          cat capacitor.config.json

      - name: Sync Capacitor for ${{ matrix.variant.name }}
        run: npx cap sync android

      - name: Fix gradlew
        run: |
          python3 -c "
          content = open('android/gradlew', 'rb').read()
          fixed = content.replace(b'\r\n', b'\n').replace(b'\r', b'\n')
          open('android/gradlew', 'wb').write(fixed)
          print('CRLF bytes fixed:', content.count(b'\r'))
          "
          chmod +x android/gradlew

      - name: Setup Gradle Properties
        run: |
          mkdir -p android
          cat > android/gradle.properties << EOF
          org.gradle.jvmargs=-Xmx3g -XX:MaxMetaspaceSize=512m
          org.gradle.daemon=false
          org.gradle.parallel=false
          org.gradle.caching=false
          android.useAndroidX=true
          android.enableJetifier=true
          EOF

      - name: Build ${{ matrix.variant.name }} APK
        timeout-minutes: 20
        run: |
          cd android
          echo "Starting Gradle build for ${{ matrix.variant.name }}..."
          ./gradlew assembleDebug \
            --no-daemon \
            --no-parallel \
            --max-workers=2 \
            --stacktrace \
            --info 2>&1 | tail -100
          BUILD_EXIT=${PIPESTATUS[0]}
          cd ..
          
          if [ $BUILD_EXIT -ne 0 ]; then
            echo "Build failed: $BUILD_EXIT"
            exit 1
          fi
          
          find android/app/build/outputs/apk -name "*.apk" | head -1 | xargs -I {} cp {} ${{ matrix.variant.output }}
          ls -lh ${{ matrix.variant.output }} || echo "ERROR: APK not found"

      - name: Upload ${{ matrix.variant.name }} APK
        uses: actions/upload-artifact@v4
        with:
          name: BattlePro-${{ matrix.variant.name }}-APK
          path: ${{ matrix.variant.output }}
          retention-days: 7
