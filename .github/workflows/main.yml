name: Build 3 APKs

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        variant: 
          - { name: "admin", config: "cap.admin.json", output: "BattlePro-Admin.apk" }
          - { name: "staff", config: "cap.staff.json", output: "BattlePro-Staff.apk" }
          - { name: "user", config: "cap.user.json", output: "BattlePro-User.apk" }
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'
          cache: 'gradle'

      - name: Fix Line Endings (CRLF to LF)
        run: |
          find android -name "gradlew" -type f -exec sed -i 's/\r$//' {} \;
          find android -name "*.sh" -type f -exec sed -i 's/\r$//' {} \;
          chmod +x android/gradlew
          chmod -R +x android/gradle/wrapper
          echo "Line endings fixed"

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Generate Google Services JSON
        run: |
          mkdir -p android/app
          echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > android/app/google-services.json
        continue-on-error: true

      - name: Copy ${{ matrix.variant.name }} Configuration
        run: |
          echo "Copying ${{ matrix.variant.config }} to capacitor.config.json"
          cp ${{ matrix.variant.config }} capacitor.config.json
          cat capacitor.config.json

      - name: Sync Capacitor for ${{ matrix.variant.name }}
        run: npx cap sync android

      - name: Build ${{ matrix.variant.name }} APK
        run: |
          cd android
          echo "Starting Gradle build for ${{ matrix.variant.name }}..."
          ./gradlew assembleDebug --no-daemon --stacktrace
          BUILD_EXIT=$?
          cd ..
          
          if [ $BUILD_EXIT -ne 0 ]; then
            echo "Build failed with exit code: $BUILD_EXIT"
            exit 1
          fi
          
          echo "Build completed successfully"
          
          # Find and copy APK
          find android/app/build/outputs/apk -name "*.apk" | head -1 | xargs -I {} cp {} ${{ matrix.variant.output }}
          ls -lh ${{ matrix.variant.output }} || echo "ERROR: APK not found"

      - name: Upload ${{ matrix.variant.name }} APK
        uses: actions/upload-artifact@v4
        with:
          name: BattlePro-APKs
          path: BattlePro-*.apk
          retention-days: 7
