name: Build 3 APKs

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        variant: 
          - { name: "User", config: "cap.user.json", asset: "assets/user.jpg", output: "BattlePro-User.apk" }
          - { name: "Staff", config: "cap.staff.json", asset: "assets/staff.png", output: "BattlePro-Staff.apk" }
          - { name: "Admin", config: "cap.admin.json", asset: "assets/admin.png", output: "BattlePro-Admin.apk" }
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'
          cache: 'gradle'
          
      - name: Setup build environment
        run: |
          npm install
          npx cap init --web-dir dist
          
      - name: Grant gradlew permissions
        run: chmod +x android/gradlew

      - name: Copy ${{ matrix.variant.name }} configuration
        run: |
          cp ${{ matrix.variant.config }} capacitor.config.json
          cp ${{ matrix.variant.asset }} assets/icon.png
          echo "Building APK for: ${{ matrix.variant.name }}"
          cat capacitor.config.json

      - name: Generate capacitor assets for ${{ matrix.variant.name }}
        run: npx capacitor-assets generate --android

      - name: Sync capacitor for ${{ matrix.variant.name }}
        run: npx cap sync android

      - name: Clean gradle cache
        run: cd android && ./gradlew clean
        continue-on-error: true

      - name: Build ${{ matrix.variant.name }} APK
        run: cd android && ./gradlew assembleRelease --no-daemon

      - name: Copy APK output
        run: |
          cp android/app/build/outputs/apk/release/app-release-unsigned.apk ${{ matrix.variant.output }}
          ls -lh ${{ matrix.variant.output }}

      - name: Upload ${{ matrix.variant.name }} APK
        uses: actions/upload-artifact@v4
        with:
          name: BattlePro-APKs
          path: ${{ matrix.variant.output }}
          retention-days: 7
